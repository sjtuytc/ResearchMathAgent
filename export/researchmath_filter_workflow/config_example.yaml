# ResearchMath Ranker — Configuration Example
# Copy to config.yaml and edit. All values here are defaults.

# Anthropic model to use for scoring.
# Cheaper/faster options: claude-haiku-4-5-20251001
# Highest quality: claude-opus-4-8
model: claude-opus-4-8

# Which datasets to score. Remove entries to skip them.
# Benchmark datasets (first_proof_1, first_proof_2) are excluded automatically.
datasets:
  - researchmath_14k
  - erdos_problems
  - aim_problem_lists
  - formal_conjectures
  - unsolved_math

# Max problems to score per dataset (set to null for all)
limit_per_dataset: 100

# Filter by open_status before scoring: open | solved | partially_solved | unknown | ""
# Leave empty to score all statuses.
status_filter: ""

# Seconds to wait between Claude API calls (increase if you hit rate limits)
delay_between_calls: 0.5

# Hosted filter API base URL (used when local data directory is not provided)
filter_api_url: "https://zipfile-legume-gaining.ngrok-free.dev/rmac/filter"

# Path to local data/datasets directory (optional).
# If set, problems are read from disk instead of the API.
# local_data_dir: "/path/to/ResearchMathAgent-web/data/datasets"

# Output directory for ranked JSON and CSV files
output_dir: "ranked_output"

# Scoring dimension weights (must sum to 1.0)
weights:
  importance: 0.30
  ai_tractability: 0.25
  verifiability: 0.20
  clarity: 0.15
  self_containedness: 0.10
