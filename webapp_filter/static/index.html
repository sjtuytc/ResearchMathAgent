<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ResearchMath Filter</title>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script>
MathJax = {
  tex: {
    inlineMath: [['$','$'],['\\(','\\)']],
    displayMath: [['$$','$$'],['\\[','\\]']],
    processEscapes: true,
    tags: 'ams',
  },
  options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] },
  svg: { fontCache: 'global', scale: 1.05 },
  startup: { typeset: false }
};
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg-full.js"></script>
<script>
(function(){const _f=window.fetch;window.fetch=function(u,o={}){if(typeof u==='string'&&u.startsWith('/')){o={...o,headers:{...o.headers,'ngrok-skip-browser-warning':'1'}};}return _f(u,o);};})();
</script>
<style>
:root{--bg:#0e1117;--panel:#161b22;--panel2:#1c2230;--border:#2a3140;--text:#e6edf3;
      --muted:#8b949e;--accent:#58a6ff;--accent2:#bc8cff;--green:#3fb950;--red:#f85149;--amber:#d29922;}
*{box-sizing:border-box}
body{margin:0;font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
header{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
header h1{font-size:15px;margin:0;font-weight:700}
.badge{font-size:10px;padding:2px 8px;border-radius:12px;background:rgba(88,166,255,.15);color:var(--accent);border:1px solid rgba(88,166,255,.3);font-weight:600}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.ds-sel{padding:4px 8px;background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:12px}
#total-badge{font-size:11px;color:var(--muted)}
.layout{display:grid;grid-template-columns:280px 1fr;flex:1;overflow:hidden}
.sidebar{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--panel)}
.filters{padding:10px;overflow-y:auto;flex:1}
.filters h3{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:10px 0 5px}
.filters h3:first-child{margin-top:0}
input[type=text],select{width:100%;padding:6px 8px;background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:12px;margin-bottom:6px}
input[type=text]:focus,select:focus{outline:none;border-color:var(--accent)}
.domain-list{display:flex;flex-direction:column;gap:2px;max-height:200px;overflow-y:auto}
.domain-item{display:flex;align-items:center;gap:6px;padding:3px 6px;border-radius:4px;cursor:pointer;font-size:12px;color:var(--muted)}
.domain-item:hover{background:var(--panel2);color:var(--text)}
.domain-item.active{background:rgba(88,166,255,.12);color:var(--accent);font-weight:600}
.domain-item .cnt{margin-left:auto;font-size:10px;color:var(--muted)}
.status-chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:var(--panel2);color:var(--muted);cursor:pointer;transition:all .12s}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
button{padding:7px 14px;border:0;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:filter .12s,opacity .12s}
.btn-pri{background:var(--accent);color:#07101f}
.btn-pri:hover{filter:brightness(1.15)}
.btn-sec{background:var(--panel2);color:var(--text);border:1px solid var(--border)}
.btn-sec:hover{background:#222c3a}
button:disabled{opacity:.5;cursor:not-allowed}
.main{display:flex;flex-direction:column;overflow:hidden}
.plist{flex:1;overflow-y:auto;padding:10px}
.prob-card{padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:border-color .12s,background .12s}
.prob-card:hover{border-color:var(--accent);background:rgba(88,166,255,.04)}
.prob-card.active{border-color:var(--accent);background:rgba(88,166,255,.07)}
.prob-id{font-size:10px;color:var(--muted);font-family:monospace}
.prob-title{font-size:13px;font-weight:600;margin:2px 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prob-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:4px}
.tag{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--panel2);border:1px solid var(--border);color:var(--muted)}
.diff-bar{height:3px;border-radius:2px;background:var(--border);width:50px;overflow:hidden;display:inline-block;vertical-align:middle}
.diff-fill{height:100%;border-radius:2px;background:var(--accent)}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.s-open{background:var(--green)}
.s-solved{background:var(--accent)}
.s-partial{background:var(--amber)}
.s-unknown{background:var(--muted)}
.pagination{padding:10px;display:flex;align-items:center;gap:8px;border-top:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.pagination span{font-size:12px;color:var(--muted)}
.pagination button{padding:4px 10px;font-size:11px}
.page-info{font-size:12px;color:var(--muted);margin:0 4px}
/* Detail panel */
#detail{display:none;flex-direction:column;border-left:1px solid var(--border);overflow:hidden;background:var(--bg)}
#detail.open{display:flex}
.detail-header{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.detail-header .did{font-size:10px;color:var(--muted);font-family:monospace}
.detail-header .dtitle{font-size:15px;font-weight:700;margin:4px 0 6px;line-height:1.3}
.detail-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.detail-body{flex:1;overflow-y:auto;padding:16px}
.detail-section{margin-bottom:16px}
.detail-section h4{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 0 8px}
.rendered{font-size:13px;line-height:1.65;color:var(--text)}
.rendered p{margin:.3em 0}
.rendered mjx-container[display="true"]{overflow-x:auto;max-width:100%;margin:.5em 0}
.status-summary{font-size:12px;color:var(--muted);line-height:1.6;padding:10px 12px;background:var(--panel);border:1px solid var(--border);border-radius:6px}
.empty{color:var(--muted);text-align:center;padding:60px 20px;font-size:13px}
#loading-bar{height:2px;background:var(--accent);position:fixed;top:0;left:0;width:0;transition:width .2s;z-index:999}
.sort-row{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.sort-row label{font-size:11px;color:var(--muted);flex-shrink:0}
.sort-row select{margin-bottom:0;flex:1}
.search-wrap{position:relative;margin-bottom:6px}
.search-wrap input{padding-right:28px}
.search-clear{position:absolute;right:7px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--muted);font-size:14px;line-height:1;display:none;background:none;border:none;padding:0;width:16px;height:16px}
.search-clear.vis{display:block}
/* Overlay layout for detail on narrow screens */
@media(max-width:900px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none}
  #detail.open{position:fixed;inset:0;z-index:50;top:52px}
}
</style>
</head>
<body>
<div id="loading-bar"></div>
<header>
  <h1>ResearchMath <span style="color:var(--accent)">Filter</span></h1>
  <span class="badge">14k dataset · read-only</span>
  <div class="header-right">
    <span id="total-badge"></span>
    <select id="ds-sel" class="ds-sel" title="Switch dataset"></select>
    <a id="solve-link" href="/rmac/solve/" class="btn-sec" style="text-decoration:none;font-size:11px;padding:4px 10px">Solve ↗</a>
  </div>
</header>

<div class="layout">
  <!-- sidebar -->
  <aside class="sidebar">
    <div class="filters">
      <h3>Search</h3>
      <div class="search-wrap">
        <input type="text" id="f-search" placeholder="title, statement, tags…" oninput="onSearch()">
        <button class="search-clear" id="f-clear" onclick="clearSearch()" title="Clear">✕</button>
      </div>

      <div class="sort-row">
        <label>Sort</label>
        <select id="f-sort" onchange="loadPage(1)">
          <option value="id">Default</option>
          <option value="title">Title A→Z</option>
          <option value="difficulty_asc">Difficulty: easy→hard</option>
          <option value="difficulty_desc">Difficulty: hard→easy</option>
        </select>
      </div>

      <h3>Status</h3>
      <div class="status-chips">
        <span class="chip active" data-status="" onclick="setStatus(this, '')">All</span>
        <span class="chip" data-status="open" onclick="setStatus(this, 'open')">Open</span>
        <span class="chip" data-status="solved" onclick="setStatus(this, 'solved')">Solved</span>
        <span class="chip" data-status="partially_solved" onclick="setStatus(this, 'partially_solved')">Partial</span>
        <span class="chip" data-status="unknown" onclick="setStatus(this, 'unknown')">Unknown</span>
      </div>

      <h3 style="margin-top:12px">Domain</h3>
      <div id="domain-list" class="domain-list"></div>
    </div>
  </aside>

  <!-- main -->
  <main class="main">
    <div id="plist" class="plist">
      <div class="empty" id="empty-msg">Loading…</div>
    </div>
    <div class="pagination" id="pagination" style="display:none">
      <button class="btn-sec" id="pg-prev" onclick="loadPage(state.page-1)" disabled>‹ Prev</button>
      <span class="page-info" id="pg-info"></span>
      <button class="btn-sec" id="pg-next" onclick="loadPage(state.page+1)">Next ›</button>
      <span id="pg-total" style="font-size:11px;color:var(--muted);margin-left:auto"></span>
    </div>
  </main>

  <!-- detail -->
  <div id="detail">
    <div class="detail-header">
      <button class="btn-sec" onclick="closeDetail()" style="padding:3px 10px;font-size:11px;margin-bottom:8px">← back</button>
      <div class="did" id="d-id"></div>
      <div class="dtitle" id="d-title"></div>
      <div class="detail-meta" id="d-meta"></div>
    </div>
    <div class="detail-body">
      <div class="detail-section">
        <h4>Problem Statement</h4>
        <div class="rendered" id="d-statement"></div>
      </div>
      <div class="detail-section" id="d-summary-sec" style="display:none">
        <h4>Status Summary</h4>
        <div class="status-summary" id="d-summary"></div>
      </div>
      <div class="detail-section" id="d-source-sec" style="display:none">
        <h4>Source</h4>
        <div id="d-source" style="font-size:12px;color:var(--muted)"></div>
      </div>
    </div>
  </div>
</div>

<script>
// Detect base path: when served through the proxy at /rmac/filter/,
// API calls must be prefixed with /rmac/filter so the proxy routes them here.
const _loc = window.location.pathname;
const BASE = _loc.startsWith('/rmac/filter') ? '/rmac/filter' : '';

const state = {
  dataset: 'researchmath_14k',
  page: 1,
  pageSize: 50,
  pages: 1,
  total: 0,
  search: '',
  domain: '',
  status: '',
  sort: 'id',
  searchTimer: null,
};

let loadingTimer = null;

function setLoading(on) {
  const bar = document.getElementById('loading-bar');
  if (on) {
    bar.style.width = '60%';
  } else {
    bar.style.width = '100%';
    if (loadingTimer) clearTimeout(loadingTimer);
    loadingTimer = setTimeout(() => { bar.style.width = '0'; }, 350);
  }
}

async function apiFetch(url) {
  const r = await fetch(BASE + url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ── Dataset ──────────────────────────────────────────────────────────────────
async function loadDatasets() {
  try {
    const data = await apiFetch('/api/datasets');
    const sel = document.getElementById('ds-sel');
    sel.innerHTML = '';
    for (const ds of data.datasets) {
      const opt = document.createElement('option');
      opt.value = ds.slug;
      opt.textContent = ds.name + (ds.problem_count ? ` (${ds.problem_count.toLocaleString()})` : '');
      if (ds.slug === state.dataset) opt.selected = true;
      sel.appendChild(opt);
    }
    sel.onchange = () => {
      state.dataset = sel.value;
      state.page = 1;
      state.domain = '';
      loadDomains();
      loadPage(1);
    };
  } catch(e) {
    console.error('loadDatasets', e);
  }
}

// ── Domains ──────────────────────────────────────────────────────────────────
async function loadDomains() {
  try {
    const data = await apiFetch(`/api/domains/${state.dataset}`);
    const el = document.getElementById('domain-list');
    el.innerHTML = '';
    // "All" entry
    const all = document.createElement('div');
    all.className = 'domain-item' + (state.domain === '' ? ' active' : '');
    all.dataset.domain = '';
    all.innerHTML = '<span>All domains</span><span class="cnt"></span>';
    all.onclick = () => setDomain(all, '');
    el.appendChild(all);

    for (const d of data.domains) {
      const item = document.createElement('div');
      item.className = 'domain-item' + (state.domain === d.name ? ' active' : '');
      item.dataset.domain = d.name;
      item.innerHTML = `<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(d.name)}</span><span class="cnt">${d.count}</span>`;
      item.onclick = () => setDomain(item, d.name);
      el.appendChild(item);
    }
  } catch(e) {}
}

function setDomain(el, domain) {
  document.querySelectorAll('.domain-item').forEach(d => d.classList.remove('active'));
  el.classList.add('active');
  state.domain = domain;
  loadPage(1);
}

// ── Status filter ─────────────────────────────────────────────────────────────
function setStatus(el, status) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  state.status = status;
  loadPage(1);
}

// ── Search ────────────────────────────────────────────────────────────────────
function onSearch() {
  const val = document.getElementById('f-search').value;
  document.getElementById('f-clear').classList.toggle('vis', val.length > 0);
  clearTimeout(state.searchTimer);
  state.searchTimer = setTimeout(() => {
    state.search = val;
    loadPage(1);
  }, 350);
}

function clearSearch() {
  document.getElementById('f-search').value = '';
  document.getElementById('f-clear').classList.remove('vis');
  state.search = '';
  loadPage(1);
}

// ── Problem list ──────────────────────────────────────────────────────────────
async function loadPage(page) {
  state.page = Math.max(1, page);
  state.sort = document.getElementById('f-sort').value;
  closeDetail();
  setLoading(true);

  const params = new URLSearchParams({
    dataset: state.dataset,
    page: state.page,
    page_size: state.pageSize,
    sort: state.sort,
  });
  if (state.search) params.set('search', state.search);
  if (state.domain) params.set('domain', state.domain);
  if (state.status) params.set('status', state.status);

  try {
    const data = await apiFetch('/api/problems?' + params);
    state.total = data.total;
    state.pages = data.pages;
    renderList(data.problems);
    renderPagination();
    document.getElementById('total-badge').textContent = `${data.total.toLocaleString()} problems`;
  } catch(e) {
    document.getElementById('plist').innerHTML = `<div class="empty">Error: ${esc(String(e))}</div>`;
  } finally {
    setLoading(false);
  }
}

function statusDot(s) {
  const cls = s === 'open' ? 's-open' : s === 'solved' ? 's-solved' : s === 'partially_solved' ? 's-partial' : 's-unknown';
  return `<span class="status-dot ${cls}"></span>`;
}

function diffBar(v) {
  if (v == null) return '';
  const pct = Math.round(v * 100);
  const color = pct < 40 ? 'var(--green)' : pct < 70 ? 'var(--amber)' : 'var(--red)';
  return `<span class="diff-bar" title="difficulty ${pct}%"><span class="diff-fill" style="width:${pct}%;background:${color}"></span></span>`;
}

function renderList(problems) {
  const el = document.getElementById('plist');
  if (!problems.length) {
    el.innerHTML = '<div class="empty">No problems match your filters.</div>';
    return;
  }
  el.innerHTML = problems.map(p => {
    const tags = (p.tags || []).slice(0, 3).map(t => `<span class="tag">${esc(t)}</span>`).join('');
    return `<div class="prob-card" data-id="${esc(p.id)}" onclick="openDetail('${esc(p.id)}')">
      <div style="display:flex;align-items:center;gap:6px">
        ${statusDot(p.open_status)}
        <span class="prob-id">${esc(p.id)}</span>
        ${p.taxonomy_level_1 ? `<span class="tag" style="margin-left:auto">${esc(p.taxonomy_level_1)}</span>` : ''}
      </div>
      <div class="prob-title" title="${esc(p.title)}">${esc(p.title)}</div>
      <div class="prob-meta">
        ${tags}
        ${diffBar(p.difficulty)}
        ${p.year ? `<span style="font-size:10px;color:var(--muted)">${p.year}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function renderPagination() {
  const pg = document.getElementById('pagination');
  if (state.pages <= 1 && state.page === 1) {
    pg.style.display = 'none';
    return;
  }
  pg.style.display = 'flex';
  document.getElementById('pg-prev').disabled = state.page <= 1;
  document.getElementById('pg-next').disabled = state.page >= state.pages;
  document.getElementById('pg-info').textContent = `Page ${state.page} of ${state.pages}`;
  const start = (state.page - 1) * state.pageSize + 1;
  const end = Math.min(state.page * state.pageSize, state.total);
  document.getElementById('pg-total').textContent = `${start}–${end} of ${state.total.toLocaleString()}`;
}

// ── Problem detail ────────────────────────────────────────────────────────────
async function openDetail(id) {
  document.querySelectorAll('.prob-card').forEach(c => c.classList.toggle('active', c.dataset.id === id));

  const detail = document.getElementById('detail');
  detail.classList.add('open');
  document.getElementById('d-id').textContent = id;
  document.getElementById('d-title').textContent = 'Loading…';
  document.getElementById('d-statement').textContent = '';
  document.getElementById('d-summary').textContent = '';
  document.getElementById('d-summary-sec').style.display = 'none';
  document.getElementById('d-source-sec').style.display = 'none';

  try {
    const p = await apiFetch(`/api/problem/${state.dataset}/${id}`);
    document.getElementById('d-id').textContent = p.id;
    document.getElementById('d-title').textContent = p.title || p.id;

    // meta
    const meta = document.getElementById('d-meta');
    const ost = p.open_status || 'unknown';
    const ostLabel = ost === 'open' ? '🔴 Open' : ost === 'solved' ? '✅ Solved' : ost === 'partially_solved' ? '🟡 Partial' : '⚪ Unknown';
    const tags = (p.tags || []).slice(0, 4).map(t => `<span class="tag">${esc(t)}</span>`).join(' ');
    meta.innerHTML = `
      <span style="font-size:11px;font-weight:600">${ostLabel}</span>
      ${p.difficulty != null ? `${diffBar(p.difficulty)}<span style="font-size:10px;color:var(--muted)">diff ${Math.round(p.difficulty*100)}%</span>` : ''}
      ${p.year ? `<span class="tag">${p.year}</span>` : ''}
      ${tags}
    `;

    // statement — render as markdown + MathJax
    const stmt = document.getElementById('d-statement');
    stmt.innerHTML = marked.parse(p.statement || '');
    if (window.MathJax) {
      MathJax.typesetPromise([stmt]).catch(()=>{});
    }

    // status summary
    if (p.status_summary) {
      document.getElementById('d-summary').textContent = p.status_summary;
      document.getElementById('d-summary-sec').style.display = '';
    }

    // source
    if (p.source_url) {
      const src = document.getElementById('d-source');
      src.innerHTML = `<a href="${esc(p.source_url)}" target="_blank" rel="noopener" style="color:var(--accent)">${esc(p.source_url)}</a>`;
      if (p.paper_id) src.innerHTML += `<br><span style="color:var(--muted)">Paper: ${esc(p.paper_id)}</span>`;
      document.getElementById('d-source-sec').style.display = '';
    }
  } catch(e) {
    document.getElementById('d-title').textContent = 'Error loading problem';
    document.getElementById('d-statement').textContent = String(e);
  }
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  document.querySelectorAll('.prob-card').forEach(c => c.classList.remove('active'));
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
(async () => {
  await loadDatasets();
  await loadDomains();
  await loadPage(1);
})();
</script>
</body>
</html>
