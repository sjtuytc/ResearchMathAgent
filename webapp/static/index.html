<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Research Math Agent</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<style>
  :root{--bg:#0e1117;--panel:#161b22;--panel2:#1c2230;--border:#2a3140;--text:#e6edf3;
        --muted:#8b949e;--accent:#58a6ff;--accent2:#bc8cff;--green:#3fb950;--red:#f85149;--amber:#d29922;}
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text)}
  header{padding:13px 20px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:12px}
  header h1{font-size:16px;margin:0}
  header .sub{color:var(--muted);font-size:12px}
  .status{font-size:12px;color:var(--muted);margin-left:auto}
  .layout{display:grid;grid-template-columns:260px 1fr;height:calc(100vh - 52px)}
  .sidebar{border-right:1px solid var(--border);overflow-y:auto;padding:10px}
  .sidebar h2{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:8px 8px 6px}
  .qitem{padding:9px 10px;border-radius:7px;cursor:pointer;margin-bottom:3px;border:1px solid transparent}
  .qitem:hover{background:var(--panel)}
  .qitem.active{background:var(--panel2);border-color:var(--border)}
  .qitem .qid{font-weight:700;color:var(--accent)}
  .qitem .qt{display:block;font-size:12px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .main{display:flex;flex-direction:column;min-width:0}
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);padding:0 14px}
  .tab{padding:11px 16px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;font-size:13px}
  .tab.active{color:var(--text);border-bottom-color:var(--accent)}
  .pane{flex:1;overflow-y:auto;padding:18px 22px;display:none}
  .pane.active{display:block}
  .ttl{font-size:18px;margin:0 0 6px}
  .bar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
  button{padding:8px 14px;border:0;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer}
  .btn-pri{background:var(--accent);color:#07101f}
  .btn-sec{background:var(--panel2);color:var(--text);border:1px solid var(--border)}
  button:disabled{opacity:.5;cursor:not-allowed}
  select,input[type=text]{padding:7px 9px;background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:13px}
  label.inline{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
  textarea{width:100%;min-height:340px;background:#0b0f16;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:12px;font-family:"SF Mono",Menlo,Consolas,monospace;font-size:12.5px;line-height:1.5}
  pre{background:#0b0f16;border:1px solid var(--border);border-radius:8px;padding:12px;overflow-x:auto;font-size:12.5px}
  code{font-family:"SF Mono",Menlo,Consolas,monospace}
  .rendered{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px 18px}
  .rendered p:first-child{margin-top:0}
  .muted{color:var(--muted)}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin:10px 0}
  .card .tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:flex;gap:8px;align-items:center}
  .card.thinking{background:var(--panel2);border-style:dashed}
  .card.thinking .tag{color:var(--accent2)}
  .card.thinking .body{color:var(--muted);white-space:pre-wrap;font-size:13px}
  .card.assistant .tag{color:var(--accent)}
  .card.tool .tag{color:var(--amber)}
  .card.artifact .tag{color:var(--green)}
  .card.error{border-color:var(--red)} .card.error .tag{color:var(--red)}
  .tool-io .lbl{color:var(--muted);margin-top:6px;font-size:12px}
  .turn-sep{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin:16px 0 6px}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .dot.run{background:var(--amber);animation:pulse 1.2s infinite}.dot.ok{background:var(--green)}.dot.err{background:var(--red)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .usage{font-size:12px;color:var(--muted);margin-left:auto}
  .usage b{color:var(--text)}
  details summary{cursor:pointer;color:var(--muted);font-size:12px}
  .pill{font-size:11px;padding:2px 8px;border-radius:999px;background:var(--panel2);border:1px solid var(--border);color:var(--muted)}
  .pill.on{color:var(--green);border-color:var(--green)}
  .empty{color:var(--muted);padding:40px;text-align:center}
</style>
</head>
<body>
<header>
  <h1>Research Math Agent</h1>
  <span class="sub">First Proof benchmark · questions, issues, and a live solver</span>
  <span class="status" id="status">select a question</span>
</header>
<div class="layout">
  <aside class="sidebar"><h2>Questions</h2><div id="qlist"></div></aside>
  <main class="main">
    <div class="tabs">
      <div class="tab active" data-tab="question">Question</div>
      <div class="tab" data-tab="issue">Issue</div>
      <div class="tab" data-tab="agent">Agent</div>
    </div>

    <section class="pane active" id="pane-question">
      <div id="q-empty" class="empty">Pick a question on the left.</div>
      <div id="q-body" style="display:none">
        <h2 class="ttl" id="q-title"></h2>
        <div class="bar">
          <button class="btn-sec" id="q-toggle">View raw .tex</button>
          <span class="muted" id="q-file"></span>
        </div>
        <div class="rendered" id="q-rendered"></div>
        <pre id="q-raw" style="display:none"><code id="q-raw-code"></code></pre>
      </div>
    </section>

    <section class="pane" id="pane-issue">
      <div id="i-empty" class="empty">Pick a question to see its issue.</div>
      <div id="i-body" style="display:none">
        <div class="bar">
          <button class="btn-pri" id="i-save">Save issue</button>
          <button class="btn-sec" id="i-preview">Preview</button>
          <span class="muted" id="i-status"></span>
        </div>
        <textarea id="i-editor" spellcheck="false"></textarea>
        <div class="rendered" id="i-rendered" style="display:none;margin-top:12px"></div>
      </div>
    </section>

    <section class="pane" id="pane-agent">
      <div id="a-empty" class="empty">Pick a question, then run the agent.</div>
      <div id="a-body" style="display:none">
        <div class="bar">
          <label class="inline">Provider
            <select id="provider"></select>
          </label>
          <label class="inline">Model
            <input type="text" id="model" style="width:170px" />
          </label>
          <label class="inline"><input type="checkbox" id="thinking" checked /> show thinking</label>
          <button class="btn-pri" id="run">Solve</button>
          <button class="btn-sec" id="stop" style="display:none">Stop</button>
          <span class="usage" id="usage"></span>
        </div>
        <div id="prov-note" class="muted" style="margin-bottom:10px;font-size:12px"></div>
        <div id="stream"></div>
      </div>
    </section>
  </main>
</div>
<script>
const $=(id)=>document.getElementById(id);
let problems=[], selected=null, claudeCode=false, es=null;
let cur={text:null,think:null}; const toolCards={}; let lastArtifact=null;

const KATEX_OPTS={delimiters:[
  {left:"$$",right:"$$",display:true},{left:"\\[",right:"\\]",display:true},
  {left:"$",right:"$",display:false},{left:"\\(",right:"\\)",display:false}],throwOnError:false};

function el(t,c,h){const e=document.createElement(t);if(c)e.className=c;if(h!==undefined)e.innerHTML=h;return e;}
function esc(s){return (s||"").replace(/[&<>]/g,(c)=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function md(node,raw){node.dataset.raw=raw;node.innerHTML=marked.parse(raw);if(window.renderMathInElement)renderMathInElement(node,KATEX_OPTS);}
function setStatus(s,cls){$("status").innerHTML=cls?`<span class="dot ${cls}"></span> ${s}`:s;}

async function init(){
  const r=await fetch("/api/problems");const d=await r.json();
  problems=d.problems; claudeCode=d.claude_code;
  const list=$("qlist"); list.innerHTML="";
  for(const p of problems){
    const it=el("div","qitem");
    it.innerHTML=`<span class="qid">${p.id}</span><span class="qt">${esc(p.title.replace(/^Problem \d+:\s*/,''))}</span>`;
    it.onclick=()=>selectQuestion(p.id,it);
    list.appendChild(it);
  }
  // provider options
  const prov=$("provider"); prov.innerHTML="";
  if(claudeCode) prov.appendChild(new Option("Claude Code (subscription)","claude-code"));
  prov.appendChild(new Option("Anthropic API","api"));
  prov.value=claudeCode?"claude-code":"api";
  prov.onchange=onProviderChange; onProviderChange();
}

function onProviderChange(){
  const p=$("provider").value;
  $("model").value = p==="claude-code" ? "sonnet" : "claude-opus-4-8";
  $("prov-note").innerHTML = p==="claude-code"
    ? "Runs the local <code>claude</code> CLI using your Pro/Max subscription — no API credits. Models: <code>sonnet</code>, <code>opus</code>, <code>haiku</code>."
    : "Uses the Anthropic Messages API (requires <code>ANTHROPIC_API_KEY</code>, billed per token).";
}

function setTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===name));
  document.querySelectorAll(".pane").forEach(p=>p.classList.toggle("active",p.id==="pane-"+name));
}
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>setTab(t.dataset.tab));

async function selectQuestion(qid,node){
  selected=qid;
  document.querySelectorAll(".qitem").forEach(n=>n.classList.remove("active"));
  if(node)node.classList.add("active");
  setStatus(`${qid} selected`);
  // Question
  const pr=await (await fetch(`/api/problem/${qid}`)).json();
  $("q-empty").style.display="none"; $("q-body").style.display="block";
  $("q-title").textContent=pr.title; $("q-file").textContent=`problems/${qid}.tex`;
  $("q-raw-code").textContent=pr.tex; $("q-raw").style.display="none";
  const r=$("q-rendered"); r.style.display="block"; md(r, extractStatement(pr.tex));
  // Issue
  const is=await (await fetch(`/api/issue/${qid}`)).json();
  $("i-empty").style.display="none"; $("i-body").style.display="block";
  $("i-editor").value=is.markdown; $("i-rendered").style.display="none"; $("i-status").textContent="";
  // Agent
  $("a-empty").style.display="none"; $("a-body").style.display="block";
  $("stream").innerHTML=""; $("usage").textContent=""; lastArtifact=null;
}

function extractStatement(tex){
  let m=tex.match(/\\begin\{document\}([\s\S]*?)\\end\{document\}/);
  let body=m?m[1]:tex;
  body=body.replace(/\\maketitle/g,"").replace(/\\title\{[^}]*\}/g,"")
           .replace(/\\author\{[^}]*\}/g,"").replace(/\\date\{[^}]*\}/g,"")
           .replace(/\\input\{[^}]*\}/g,"");
  return body.trim();
}

$("q-toggle").onclick=()=>{
  const raw=$("q-raw"), ren=$("q-rendered"), b=$("q-toggle");
  const showRaw=raw.style.display==="none";
  raw.style.display=showRaw?"block":"none"; ren.style.display=showRaw?"none":"block";
  b.textContent=showRaw?"View rendered":"View raw .tex";
};

$("i-save").onclick=async()=>{
  if(!selected)return;
  await fetch(`/api/issue/${selected}`,{method:"POST",headers:{"content-type":"application/json"},
    body:JSON.stringify({markdown:$("i-editor").value})});
  $("i-status").textContent="saved ✓";
};
$("i-preview").onclick=()=>{
  const r=$("i-rendered"); const show=r.style.display==="none";
  r.style.display=show?"block":"none"; $("i-preview").textContent=show?"Hide preview":"Preview";
  if(show)md(r,$("i-editor").value);
};

// ---- Agent stream ----
function scroll(){const s=$("stream");s.scrollTop=s.scrollHeight;}
function handle(ev){
  switch(ev.type){
    case "start":
      $("stream").innerHTML=""; Object.keys(toolCards).forEach(k=>delete toolCards[k]);
      cur={text:null,think:null}; $("usage").textContent=""; lastArtifact=null; break;
    case "status": setStatus(`running · ${ev.provider||""} ${ev.model||""}`,"run"); break;
    case "turn_start": cur={text:null,think:null}; $("stream").appendChild(el("div","turn-sep",`Turn ${ev.iteration}`)); break;
    case "thinking_delta":{
      if(!cur.think){const c=el("div","card thinking");c.appendChild(el("div","tag","Thinking"));
        cur.think=el("div","body");cur.think.dataset.raw="";c.appendChild(cur.think);$("stream").appendChild(c);}
      cur.think.dataset.raw+=ev.text; cur.think.textContent=cur.think.dataset.raw; scroll(); break;}
    case "text_delta":{
      if(!cur.text){const c=el("div","card assistant");c.appendChild(el("div","tag","Claude"));
        cur.text=el("div","body");cur.text.dataset.raw="";c.appendChild(cur.text);$("stream").appendChild(c);}
      md(cur.text,(cur.text.dataset.raw||"")+ev.text); scroll(); break;}
    case "tool_use":{
      cur={text:null,think:null};
      const c=el("div","card tool");
      c.appendChild(el("div","tag",`<span class="dot run"></span> Tool · ${esc(ev.name)}`));
      const io=el("div","tool-io"); io.appendChild(el("div","lbl","input"));
      const inp=typeof ev.input==="string"?ev.input:JSON.stringify(ev.input,null,2);
      io.appendChild(el("pre",null,`<code>${esc(inp)}</code>`)); c.appendChild(io);
      $("stream").appendChild(c); toolCards[ev.id]=c; scroll(); break;}
    case "tool_result":{
      const c=toolCards[ev.id]; if(c){
        const tag=c.querySelector(".tag");
        const nm=tag.textContent.replace(/^\s*Tool ·\s*/,"").trim();
        tag.innerHTML=`<span class="dot ${ev.is_error?"err":"ok"}"></span> Tool · ${esc(nm)}`;
        const out=el("div","tool-io"); out.appendChild(el("div","lbl",ev.is_error?"error":"result"));
        const text=(ev.output||"").trim();
        if(text.length<=1400){out.appendChild(el("pre",null,`<code>${esc(text)}</code>`));}
        else{const d=el("details");d.appendChild(el("summary",null,`result (${text.length} chars)`));
          d.appendChild(el("pre",null,`<code>${esc(text)}</code>`));out.appendChild(d);}
        c.appendChild(out);
      } scroll(); break;}
    case "artifact":{
      lastArtifact=ev;
      const c=el("div","card artifact");
      c.appendChild(el("div","tag",`<span class="dot ok"></span> Artifact · ${esc(ev.name)}`));
      const d=el("details");d.appendChild(el("summary",null,`${ev.name} (${(ev.content||"").length} chars)`));
      d.appendChild(el("pre",null,`<code>${esc(ev.content||"")}</code>`));c.appendChild(d);
      const log=el("button","btn-sec","Log run to issue");log.style.marginTop="8px";
      log.onclick=()=>logRun(ev);c.appendChild(log);
      $("stream").appendChild(c); scroll(); break;}
    case "usage":{
      let s="";
      if(ev.cost_usd!=null) s+=`est. cost <b>$${Number(ev.cost_usd).toFixed(4)}</b> · turns <b>${ev.num_turns??"?"}</b> · `;
      s+=`tokens in <b>${ev.input_tokens||0}</b> · out <b>${ev.output_tokens||0}</b>`;
      $("usage").innerHTML=s; break;}
    case "error":{
      const c=el("div","card error");c.appendChild(el("div","tag","Error"));
      c.appendChild(el("div","body",esc(ev.message||"unknown error")));$("stream").appendChild(c);scroll();break;}
    case "done": finish(ev.reason); break;
  }
}

async function logRun(art){
  if(!selected)return;
  const summary=(art.content||"").slice(0,1200);
  const entry=`Provider: ${$("provider").value}, model: ${$("model").value}.\n\n\`\`\`\n${summary}\n\`\`\``;
  await fetch(`/api/issue/${selected}/activity`,{method:"POST",headers:{"content-type":"application/json"},
    body:JSON.stringify({entry})});
  // refresh issue editor
  const is=await (await fetch(`/api/issue/${selected}`)).json(); $("i-editor").value=is.markdown;
  $("i-status").textContent="run logged to issue ✓";
}

function start(){
  if(!selected){setStatus("pick a question first");return;}
  const provider=$("provider").value, model=$("model").value.trim(), thinking=$("thinking").checked?1:0;
  $("run").style.display="none"; $("stop").style.display="inline-block"; setStatus("connecting…","run");
  const q=`/api/solve?problem=${encodeURIComponent(selected)}&provider=${encodeURIComponent(provider)}&model=${encodeURIComponent(model)}&thinking=${thinking}`;
  es=new EventSource(q);
  es.onmessage=(e)=>handle(JSON.parse(e.data));
  es.onerror=()=>{setStatus("connection closed");finish("disconnected");};
}
function finish(reason){
  if(es){es.close();es=null;}
  $("run").style.display="inline-block"; $("stop").style.display="none";
  const ok=["end_turn","stop_sequence","done",undefined].includes(reason);
  setStatus(ok?"done":String(reason),ok?"ok":"err");
}
$("run").onclick=start;
$("stop").onclick=()=>finish("stopped");
init();
</script>
</body>
</html>
