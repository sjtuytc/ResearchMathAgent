<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="only light">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="shortcut icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <title>{% block title %}ProofStack{% endblock %}</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: #fafafa;
            color: #222;
        }
        html:has(.workflow-editor-page),
        body:has(.workflow-editor-page) {
            height: 100%;
            overflow: hidden;
        }
        body:has(.workflow-editor-page) {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background: #1f2937;
            color: #fff;
            padding: 12px 24px;
            border-bottom: 3px solid #3b82f6;
            flex: none;
        }
        header a { color: #fff; text-decoration: none; }
        main { max-width: 1200px; margin: 24px auto; padding: 0 24px; }
        main:has(.home-screen) {
            min-height: calc(100vh - 120px);
            display: grid;
            place-items: center;
        }
        body:has(.editor-shell-graph-first) main,
        body:has(.workflow-editor) main {
            max-width: none;
            width: min(2200px, calc(100vw - 24px));
            margin: 18px auto;
            padding: 0 12px;
        }
        body:has(.workflow-editor-page) main {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            margin: 10px auto;
        }
        h1 { margin-top: 0; }
        h2 { margin-top: 32px; color: #1f2937; border-bottom: 1px solid #e5e7eb; padding-bottom: 4px; }
        h3 { margin-top: 24px; color: #374151; }
        .card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 16px 20px;
            margin-bottom: 16px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }
        .card h3 { margin-top: 0; }
        .pill {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.78em;
            background: #e5e7eb;
            color: #374151;
            margin-right: 6px;
            font-weight: 500;
        }
        .pill.workflow { background: #dbeafe; color: #1e40af; }
        .pill.agent { background: #dcfce7; color: #166534; }
        .pill.deterministic_tool { background: #dbeafe; color: #1e40af; }
        .pill.APICallAgent { background: #fce7f3; color: #9d174d; }
        .pill.MultiTurnAgent { background: #ede9fe; color: #5b21b6; }
        .pill.CLIAgent { background: #fee2e2; color: #991b1b; }
        code {
            background: #f3f4f6;
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 0.92em;
        }
        pre {
            background: #f3f4f6;
            padding: 12px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 0.88em;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        details {
            border-top: 1px solid #e5e7eb;
            margin-top: 12px;
            padding-top: 10px;
        }
        details summary {
            cursor: pointer;
            font-weight: 600;
            color: #374151;
            padding: 4px 0;
        }
        details[open] summary { color: #1f2937; }
        .dim { color: #6b7280; font-size: 0.9em; }
        .home-screen {
            width: min(760px, 100%);
            text-align: center;
        }
        .home-screen h1 {
            margin: 0 0 26px;
            font-size: 2.7rem;
            font-weight: 720;
            letter-spacing: 0;
            color: #111827;
        }
        .home-actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }
        .button-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            min-height: 42px;
            padding: 10px 16px;
            border-radius: 6px;
            border: 1px solid #2563eb;
            background: #2563eb;
            color: #fff;
            text-decoration: none;
            font-weight: 650;
            line-height: 1.2;
            white-space: normal;
        }
        .button-action:disabled {
            cursor: default;
            opacity: 0.6;
        }
        .big-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 52px;
            padding: 10px 14px;
            border-radius: 6px;
            border: 1px solid #d1d5db;
            background: #fff;
            color: #111827;
            text-decoration: none;
            font-size: 1.08rem;
            font-weight: 620;
            line-height: 1.2;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        }
        .button-action:hover {
            background: #1d4ed8;
            border-color: #1d4ed8;
        }
        .big-action:hover {
            background: #f8fafc;
            border-color: #9ca3af;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
        }
        .button-action.secondary {
            background: #fff;
            color: #1f2937;
            border-color: #d1d5db;
        }
        .button-action.secondary:hover {
            background: #f3f4f6;
            border-color: #9ca3af;
        }
        .button-action.danger {
            background: #fff;
            color: #991b1b;
            border-color: #fecaca;
        }
        .button-action.danger:hover {
            background: #fef2f2;
            border-color: #fca5a5;
        }
        .confirm-overlay {
            position: fixed;
            inset: 0;
            z-index: 20000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(17, 24, 39, 0.42);
        }
        .confirm-overlay.visible {
            display: flex;
        }
        .confirm-dialog {
            width: min(420px, 100%);
            border: 1px solid #fecaca;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 24px 70px rgba(15, 23, 42, 0.28);
            padding: 18px 18px 16px;
        }
        .confirm-dialog h2 {
            margin: 0 0 8px;
            border-bottom: 0;
            padding: 0;
            color: #991b1b;
            font-size: 1.05rem;
        }
        .confirm-dialog p {
            margin: 0;
            color: #374151;
            line-height: 1.45;
        }
        .confirm-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 18px;
        }
        .preset-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .card-header-row,
        .page-header-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
        }
        .card-header-row h3,
        .page-header-row h1 {
            margin: 0;
        }
        .page-header-row {
            margin-bottom: 18px;
        }
        .run-agent-layout {
            display: grid;
            gap: 14px;
            align-items: start;
        }
        .run-agent-top {
            display: grid;
            grid-template-columns: minmax(260px, 0.75fr) minmax(300px, 1fr);
            gap: 14px;
            align-items: start;
        }
        .run-agent-panel h2 {
            margin-top: 0;
            border-bottom: 0;
            padding-bottom: 0;
        }
        .run-agent-field {
            display: grid;
            gap: 6px;
            margin: 10px 0;
            color: #374151;
            font-weight: 650;
        }
        .run-agent-field.compact {
            max-width: 220px;
        }
        .run-agent-field input,
        .run-agent-field textarea,
        .run-agent-field select,
        .api-key-row input {
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background: #fff;
            color: #111827;
            padding: 8px 10px;
            font: inherit;
        }
        .problem-picker,
        .api-key-list {
            display: grid;
            gap: 8px;
        }
        .problem-choice,
        .api-key-row {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            gap: 10px;
            align-items: start;
            border: 1px solid #e5e7eb;
            border-radius: 7px;
            background: #f9fafb;
            padding: 10px;
        }
        .api-key-row {
            grid-template-columns: minmax(0, 1fr);
        }
        .problem-choice input {
            margin-top: 3px;
        }
        .problem-choice small,
        .api-key-row small {
            display: block;
            margin-top: 3px;
            color: #6b7280;
            font-size: 0.84rem;
            line-height: 1.35;
        }
        .new-problem-box {
            margin-top: 14px;
        }
        .run-agent-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 14px;
        }
        .workflow-output-node-editor {
            display: grid;
            gap: 10px;
        }
        .workflow-output-row {
            display: grid;
            grid-template-columns: minmax(150px, 0.8fr) minmax(180px, 1fr) auto;
            gap: 8px;
            align-items: end;
            border: 1px solid #e5e7eb;
            border-radius: 7px;
            background: #f9fafb;
            padding: 10px;
        }
        .workflow-output-row label,
        .workflow-output-add {
            display: grid;
            gap: 5px;
            color: #4b5563;
            font-size: 0.82rem;
            font-weight: 650;
        }
        .workflow-output-row input,
        .workflow-output-add input {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background: #fff;
            color: #111827;
            padding: 7px 9px;
            font: inherit;
        }
        .workflow-output-source {
            min-height: 34px;
            border-radius: 6px;
            background: #ecfdf5;
            color: #166534;
            padding: 8px 9px;
            font-size: 0.84rem;
            line-height: 1.3;
        }
        .workflow-output-add {
            grid-template-columns: minmax(160px, 260px) auto;
            align-items: end;
            margin-top: 12px;
        }
        .grid {
            display: grid;
            grid-template-columns: max-content 1fr;
            gap: 4px 16px;
            margin: 8px 0;
            align-items: start;
        }
        .grid .key { font-weight: 500; color: #4b5563; line-height: 1.35; }
        .grid .val { min-width: 0; }
        .grid .val > .field-table {
            margin-top: 0;
        }
        .grid .val > .field-table > tbody > tr:first-child > th,
        .grid .val > .field-table > tbody > tr:first-child > td {
            padding-top: 0;
        }
        .field-table {
            width: 100%;
            border-collapse: collapse;
            margin: 2px 0;
            font-family: ui-monospace, SFMono-Regular, monospace;
            font-size: 0.9em;
        }
        .field-table th,
        .field-table td {
            border-bottom: 1px solid #e5e7eb;
            padding: 5px 8px;
            text-align: left;
            vertical-align: top;
        }
        .field-table tr:last-child > th,
        .field-table tr:last-child > td {
            border-bottom: 0;
        }
        .field-table th {
            width: 1%;
            color: #4b5563;
            font-weight: 650;
            white-space: nowrap;
        }
        .field-table td {
            min-width: 0;
        }
        .field-scalar {
            color: #111827;
            overflow-wrap: anywhere;
        }
        .field-list-sequence {
            padding-left: 18px;
        }
        a.agent-link { color: #1f2937; text-decoration: none; border-bottom: 1px dotted #9ca3af; }
        a.agent-link:hover { color: #3b82f6; border-bottom-color: #3b82f6; }
        .schema-field {
            margin-left: 12px;
            padding: 4px 10px;
            border-left: 2px solid #e5e7eb;
            margin-bottom: 6px;
        }
        .schema-field .fname { font-weight: 600; color: #374151; font-family: ui-monospace, monospace; }
        .schema-field .ftype { color: #7c3aed; font-size: 0.85em; margin-left: 6px; font-family: ui-monospace, monospace; }
        .schema-field .fdesc { color: #6b7280; font-size: 0.88em; margin-top: 2px; }
        nav.tabs { margin-top: 6px; }
        nav.tabs a {
            display: inline-block;
            padding: 2px 12px;
            margin-right: 4px;
            border-radius: 12px;
            background: rgba(255,255,255,0.08);
            font-size: 0.92em;
        }
        nav.tabs a.active { background: #3b82f6; color: #fff; }
        nav.tabs a:hover { background: rgba(255,255,255,0.18); }
        @media (max-width: 720px) {
            .home-actions {
                grid-template-columns: 1fr;
            }
            .home-screen h1 {
                font-size: 2.3rem;
            }
            .card-header-row,
            .page-header-row {
                align-items: stretch;
                flex-direction: column;
            }
            .run-agent-layout {
                grid-template-columns: 1fr;
            }
            .run-agent-top {
                grid-template-columns: 1fr;
            }
            .workflow-output-row,
            .workflow-output-add {
                grid-template-columns: 1fr;
            }
        }
        table.runs { border-collapse: collapse; width: 100%; }
        table.runs th, table.runs td {
            padding: 8px 10px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
            font-size: 0.92em;
        }
        table.runs th { background: #f3f4f6; color: #374151; font-weight: 600; }
        table.runs tr:hover td { background: #f9fafb; }
        ul.tree { list-style: none; padding-left: 0; }
        ul.tree ul { list-style: none; padding-left: 18px; border-left: 1px dashed #d1d5db; margin-left: 6px; }
        ul.tree li { padding: 4px 0; }
        ul.tree .node-row { display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; }
        ul.tree .node-name { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 0.92em; }
        ul.tree .node-stats { color: #6b7280; font-size: 0.85em; }
        .pill.status-ok { background: #dcfce7; color: #166534; }
        .pill.status-finished { background: #dcfce7; color: #166534; }
        .pill.status-error { background: #fee2e2; color: #991b1b; }
        .pill.status-running { background: #fef3c7; color: #92400e; }
        .pill.status-unknown { background: #e5e7eb; color: #374151; }
        .execution-graph {
            display: flex;
            flex-direction: column;
            gap: 14px;
            overflow-x: auto;
            padding: 4px 0 10px;
        }
        .graph-toolbar {
            display: flex;
            gap: 10px;
            align-items: center;
            margin: 8px 0 14px;
            flex-wrap: wrap;
        }
        .graph-toolbar input,
        .graph-toolbar select {
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 7px 10px;
            background: #fff;
            color: #1f2937;
            font: inherit;
        }
        .graph-toolbar input { min-width: 260px; }
        .execution-graph {
            display: grid;
            gap: 10px;
            max-width: 860px;
        }
        .graph-node {
            border: 1px solid #d1d5db;
            border-left: 5px solid #9ca3af;
            border-radius: 6px;
            background: #fff;
            padding: 10px 12px 10px 14px;
        }
        .graph-node.graph-hidden { display: none; }
        .graph-node.status-ok { border-left-color: #16a34a; }
        .graph-node.status-error { border-left-color: #dc2626; }
        .graph-node.status-running { border-left-color: #f97316; }
        .graph-node.status-pending { border-left-color: #eab308; }
        .graph-node.status-skipped { border-left-color: #64748b; background: #f8fafc; }
        .graph-node-main {
            display: flex;
            gap: 14px;
            align-items: center;
            justify-content: space-between;
        }
        .graph-node-copy {
            min-width: 0;
        }
        .graph-title {
            display: block;
            color: #111827;
            font-weight: 650;
            overflow-wrap: anywhere;
        }
        .graph-node-copy p {
            margin: 3px 0 0;
            color: #4b5563;
            line-height: 1.35;
        }
        .graph-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: flex-end;
            color: #6b7280;
            font-size: 0.82em;
            white-space: nowrap;
        }
        .graph-meta span {
            background: #f3f4f6;
            border-radius: 999px;
            padding: 1px 7px;
        }
        .graph-node.status-ok .graph-status-label { background: #dcfce7; color: #166534; }
        .graph-node.status-running .graph-status-label { background: #ffedd5; color: #9a3412; }
        .graph-node.status-pending .graph-status-label { background: #fef9c3; color: #854d0e; }
        .graph-node.status-skipped .graph-status-label { background: #e5e7eb; color: #374151; }
        .graph-node.status-error .graph-status-label { background: #fee2e2; color: #991b1b; }
        .graph-reason {
            margin-top: 8px;
            color: #6b7280;
            font-size: 0.88rem;
        }
        .graph-children {
            display: grid;
            gap: 8px;
            margin-top: 14px;
            margin-left: 14px;
            padding-left: 12px;
            border-left: 1px dashed #cbd5e1;
        }
        .rendered-text {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 14px 16px;
            line-height: 1.55;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }
        details.message-block {
            border-top: 0;
            border-left: 4px solid #d1d5db;
            border-radius: 6px;
            padding: 10px 12px 12px;
            margin: 12px 0;
        }
        details.message-block summary {
            padding: 0 0 8px;
        }
        details.message-block .rendered-text {
            background: transparent;
            border: 0;
            border-radius: 0;
            padding: 2px 0 0;
        }
        details.message-system {
            background: #f0f9ff;
            border-left-color: #0284c7;
        }
        details.message-user {
            background: #f7fee7;
            border-left-color: #65a30d;
        }
        details.message-output {
            background: #eff6ff;
            border-left-color: #2563eb;
        }
        details.message-input {
            background: #eff6ff;
            border-left-color: #2563eb;
        }
        details.message-input summary {
            color: #1e3a8a;
        }
        .problem-preview.latex-text {
            color: #334155;
        }
        .input-problem {
            margin: 10px 0 16px;
        }
        .input-problem .rendered-text {
            border-left: 4px solid #2563eb;
            background: #f8fbff;
            font-size: 1.02rem;
        }
        .editor-shell {
            display: grid;
            grid-template-columns: minmax(360px, 0.9fr) minmax(520px, 1.1fr);
            gap: 18px;
            align-items: start;
        }
        .editor-shell-graph-first {
            grid-template-columns: minmax(640px, 1.4fr) minmax(360px, 0.8fr);
            max-width: none;
        }
        .editor-pane {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 14px;
            min-width: 0;
        }
        .graph-editor-pane { overflow: hidden; }
        .workflow-editor {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 14px;
        }
        .workflow-editor-page {
            display: flex;
            flex: 1;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
        }
        .workflow-editor-titlebar {
            display: flex;
            flex: none;
            gap: 14px;
            align-items: end;
            justify-content: space-between;
            min-width: 0;
        }
        .workflow-editor-titlebar h1 {
            margin: 0;
            font-size: 1.35rem;
            line-height: 1.2;
            white-space: nowrap;
        }
        .workflow-editor-titlebar p {
            margin: 0;
            min-width: 0;
            overflow: hidden;
            text-align: right;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .agent-name-display {
            display: grid;
            gap: 4px;
            min-width: min(420px, 50vw);
            color: #4b5563;
            font-size: 0.82rem;
            font-weight: 600;
        }
        .tool-name-field {
            display: grid;
            gap: 5px;
            min-width: min(420px, 50vw);
            color: #4b5563;
            font-size: 0.82rem;
            font-weight: 600;
        }
        .tool-name-field input {
            border: 1px solid #d1d5db;
            border-radius: 6px;
            color: #111827;
            font: inherit;
            font-size: 1.12rem;
            font-weight: 650;
            padding: 8px 10px;
        }
        .agent-name-current {
            color: #111827;
            font-size: 1.24rem;
            font-weight: 720;
            line-height: 1.2;
            overflow-wrap: anywhere;
        }
        .agent-title-actions {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .editable-title-row,
        .editable-subtitle-row {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            min-width: 0;
        }
        .editable-title-row {
            align-items: center;
        }
        .editable-subtitle-row p {
            min-width: 0;
        }
        .inline-editable-text {
            border: 1px solid transparent;
            border-radius: 6px;
            min-width: 0;
            padding: 2px 4px;
            outline: none;
        }
        .inline-editable-text.editing {
            border-color: #93c5fd;
            background: #eff6ff;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
            cursor: text;
        }
        .icon-button.active {
            border-color: #2563eb;
            background: #eff6ff;
            color: #1d4ed8;
        }
        .icon-button {
            appearance: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            padding: 0;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background: #fff;

    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['\\(', '\\)'], ['$', '$']],
                displayMath: [['\\[', '\\]'], ['$$', '$$']],
                processEnvironments: false
            },
            options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
        };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <script>
        function filterExecutionGraph() {
            const query = (document.getElementById('graph-search')?.value || '').trim().toLowerCase();
            const status = document.getElementById('graph-status')?.value || '';
            const matches = (node) => {
                const agent = node.dataset.agent || '';
                const nodeStatus = node.dataset.status || '';
                const matchesQuery = !query || agent.includes(query);
                const matchesStatus = !status || nodeStatus === status;
                return matchesQuery && matchesStatus;
            };
            const apply = (node) => {
                const childMatches = [...node.querySelectorAll(':scope > .graph-children > .graph-node')]
                    .some((child) => apply(child));
                const visible = matches(node) || childMatches;
                node.classList.toggle('graph-hidden', !visible);
                return visible;
            };
            document.querySelectorAll('.execution-graph > .graph-node').forEach((node) => {
                apply(node);
            });
        }
        function renderLatexElements(root = document) {
            if (!window.MathJax || typeof window.MathJax.typesetPromise !== 'function') return;
            const elements = [...root.querySelectorAll('.latex-text')]
                .filter((element) => !element.dataset.latexRendered);
            if (!elements.length) return;
            window.MathJax.typesetPromise(elements).then(() => {
                elements.forEach((element) => {
                    element.dataset.latexRendered = '1';
                });
            }).catch(() => {});
        }
        function startRunGraphPolling(url) {
            const panel = document.getElementById('execution-graph-panel');
            if (!panel || !url) return;
            let inFlight = false;
            let lastHtml = panel.innerHTML;
            async function refreshGraph() {
                if (inFlight) return;
                inFlight = true;
                const query = document.getElementById('graph-search')?.value || '';
                const status = document.getElementById('graph-status')?.value || '';
                try {
                    const response = await fetch(url, {cache: 'no-store'});
                    if (!response.ok) return;
                    const html = await response.text();
                    if (html !== lastHtml) {
                        lastHtml = html;
                        panel.innerHTML = html;
                        const search = document.getElementById('graph-search');
                        const statusSelect = document.getElementById('graph-status');
                        if (search) search.value = query;
                        if (statusSelect) statusSelect.value = status;
                        filterExecutionGraph();
                    }
                    const live = panel.querySelector('[data-live-status]');
                    if (live) {
                        live.textContent = 'Updated ' + new Date().toLocaleTimeString([], {
                            hour: '2-digit',
                            minute: '2-digit'
                        });
                    }
                } catch (_) {
                    const live = panel.querySelector('[data-live-status]');
                    if (live) live.textContent = 'Live update failed';
                } finally {
                    inFlight = false;
                }
            }
            window.setInterval(refreshGraph, 3000);
        }
        function confirmAction({title = 'Delete item?', message = 'This cannot be undone.', confirmLabel = 'Delete'} = {}) {
            return new Promise((resolve) => {
                const overlay = document.getElementById('confirm-overlay');
                const titleEl = document.getElementById('confirm-title');
                const messageEl = document.getElementById('confirm-message');
                const confirmBtn = document.getElementById('confirm-accept');
                const cancelBtn = document.getElementById('confirm-cancel');
                if (!overlay || !titleEl || !messageEl || !confirmBtn || !cancelBtn) {
                    resolve(false);
                    return;
                }
                titleEl.textContent = title;
                messageEl.textContent = message;
                confirmBtn.textContent = confirmLabel;
                overlay.classList.add('visible');
                confirmBtn.focus();
                function cleanup(result) {
                    overlay.classList.remove('visible');
                    confirmBtn.removeEventListener('click', onConfirm);
                    cancelBtn.removeEventListener('click', onCancel);
                    overlay.removeEventListener('click', onOverlay);
                    document.removeEventListener('keydown', onKeydown);
                    resolve(result);
                }
                function onConfirm() { cleanup(true); }
                function onCancel() { cleanup(false); }
                function onOverlay(event) {
                    if (event.target === overlay) cleanup(false);
                }
                function onKeydown(event) {
                    if (event.key === 'Escape') cleanup(false);
                }
                confirmBtn.addEventListener('click', onConfirm);
                cancelBtn.addEventListener('click', onCancel);
                overlay.addEventListener('click', onOverlay);
                document.addEventListener('keydown', onKeydown);
            });
        }
    </script>
</head>
<body>
    <header>
        <div>
            <a href="{{ url_for('index') }}"><strong>ProofStack</strong></a>
        </div>
        <nav class="tabs">
            {% set active = active_tab|default('') %}
            <a href="{{ url_for('new_agent') }}"      class="{{ 'active' if active == 'new' else '' }}">Create New Agent</a>
            <a href="{{ url_for('presets_index') }}"  class="{{ 'active' if active == 'edit' else '' }}">Edit Agent</a>
            <a href="{{ url_for('run_agent') }}"      class="{{ 'active' if active == 'run_agent' else '' }}">Run Agent</a>
            <a href="{{ url_for('runs_index') }}"     class="{{ 'active' if active == 'runs' else '' }}">View Runs</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <div id="confirm-overlay" class="confirm-overlay" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
        <div class="confirm-dialog">
            <h2 id="confirm-title">Delete item?</h2>
            <p id="confirm-message">This cannot be undone.</p>
            <div class="confirm-actions">
                <button id="confirm-cancel" type="button" class="button-action secondary">Cancel</button>
                <button id="confirm-accept" type="button" class="button-action danger">Delete</button>
            </div>
        </div>
    </div>
</body>
</html>
