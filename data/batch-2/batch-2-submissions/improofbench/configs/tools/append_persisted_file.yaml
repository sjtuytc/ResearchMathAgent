name: append_persisted_file
description: Append text to a file persisted for this workflow run.
python_function: append_persisted_file
tool:
  type: function
  function:
    name: append_persisted_file
    description: Append text to a text file by file_id, creating the file if needed.
    parameters:
      type: object
      properties:
        file_id:
          type: string
          description: Stable id of the file to append to within this workflow run.
        text:
          type: string
          description: Text to append.
      required: [file_id, text]
