workflow: proofstack.agents.ac.ACWorkflow
description: >
  Long-form Author/Critic loop for serious research problems. Same
  agent shape as ``author_critic.yaml`` — gpt-5.5-pro Author and
  Critic with code_interpreter + web_search; full Advisory Council
  (Pro + Opus 4.7 max + Gemini); Compute Worker on codex CLI
  (gpt-5.5 xhigh) for heavy computation / multi-round code dev /
  literature retrieval — but tuned for longer runs:
  ``n_rounds: 10``, ``max_usd: 1000``, ``max_wallclock_s: 86400``,
  ``page_limit: 12``. Compute runs as a subprocess inside the already
  isolated First Proof container and therefore bypasses Codex's own
  bubblewrap sandbox; nested sandboxing is not available in the harness.
  Flip to ``docker`` for production hosts with the pwc sandbox image built.

inputs:
  n_rounds: 10
  full_critic_interval: 3
  enable_council: true
  enable_compute: true
  compute_model: gpt-5.5
  compute_reasoning_effort: xhigh
  compute_cost_config: models/openai/gpt-55-high
  compute_sandbox_backend: subprocess
  compute_codex_sandbox: docker-bypass
  enable_final_critic: false
  council_models:
    - models/openai/gpt-55-pro
    - models/anthropic/opus_47_max
    - models/gemini/gemini-31-pro
  page_limit: 12

budget:
  max_usd: 1000.0
  max_wallclock_s: 86400

components:
  Author:
    model: models/openai/gpt-55-pro
  ACCritic:
    model: models/openai/gpt-55-pro
