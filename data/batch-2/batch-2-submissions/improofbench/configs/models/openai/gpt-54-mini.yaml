model: gpt-5.4-mini--low
api: openai
max_tokens: 32000
cache_read_cost: 0.05
read_cost: 0.5
write_cost: 4
concurrent_requests: 64
temperature: null
top_p: null
batch_processing: false
background: true
use_openai_responses_api: true
service_tier: "flex"
# Per-attempt timeout. Without this the OpenAI SDK inherits APIClient's
# default of 30000s (8h20m) and a hung socket would stall the call for
# hours. 30 min is plenty for the mini tier; flex tier benefits from
# the headroom.
timeout: 1800
reasoning:
  summary: "auto"
