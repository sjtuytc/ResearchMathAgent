model: gpt-5.4--high
api: openai
max_tokens: 128000
cache_read_cost: 0.25
read_cost: 2.5
write_cost: 15
concurrent_requests: 128
temperature: null
top_p: null
batch_processing: false
background: true
use_openai_responses_api: true
service_tier: "flex"
# Per-attempt timeout. Without this the OpenAI SDK inherits APIClient's
# default of 30000s (8h20m) and a hung socket would stall the call for
# hours. 30 min is plenty for non-Pro reasoning tiers; flex tier
# benefits from the headroom.
timeout: 1800
reasoning:
  summary: "auto"
