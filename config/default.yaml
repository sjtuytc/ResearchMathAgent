# Default RMA configuration.
#
# The executable pipeline is still being built. This file defines the first
# stable configuration surface used by `rma doctor` and future commands.

project:
  name: ResearchMathAgent
  problem_dir: problems
  output_dir: output_solutions
  blocked_input_dirs:
    - final_solutions
    - output_solutions
    - skill_solutions
    - baselines

latex:
  main: main.tex
  compiler: latexmk

tiers:
  budget:
    proposer_rounds: 1
    verifier_rounds: 1
  standard:
    proposer_rounds: 2
    verifier_rounds: 2
  pro:
    proposer_rounds: 4
    verifier_rounds: 4
